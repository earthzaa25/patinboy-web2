<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ปฏิทินBoy — Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #06C755; --green-dim: rgba(6,199,85,0.12);
    --blue: #3b82f6; --blue-dim: rgba(59,130,246,0.12);
    --dark: #0d1117; --surface: #161b22; --border: #21262d;
    --text: #e6edf3; --muted: #7d8590;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Sarabun', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

  /* Loading */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 14px; }

  /* Error */
  .error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 12px; padding: 40px; text-align: center; }
  .error-icon { font-size: 48px; }
  .error-title { font-size: 20px; font-weight: 700; }
  .error-sub { font-size: 14px; color: var(--muted); }

  /* App */
  .app { display: none; max-width: 480px; margin: 0 auto; min-height: 100vh; }
  .app.ready { display: block; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon { font-size: 20px; }
  .logo-name { font-size: 16px; font-weight: 800; color: var(--green); }
  .user-info { display: flex; align-items: center; gap: 8px; }
  .user-avatar { width: 32px; height: 32px; background: var(--green-dim); border: 1px solid rgba(6,199,85,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--green); }
  .user-name { font-size: 13px; font-weight: 600; }
  .user-plan { font-size: 10px; color: var(--muted); }

  /* Month nav */
  .month-nav { display: flex; align-items: center; justify-content: space-between; }
  .month-label { font-size: 18px; font-weight: 700; }
  .nav-btn { width: 36px; height: 36px; background: var(--dark); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .nav-btn:hover { border-color: var(--green); color: var(--green); }
  .today-btn { padding: 6px 14px; background: var(--green-dim); border: 1px solid rgba(6,199,85,0.3); border-radius: 20px; color: var(--green); font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Sarabun', sans-serif; transition: all 0.15s; }

  /* Calendar */
  .cal-wrap { padding: 16px; }
  .cal-days-header { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 8px; }
  .cal-day-label { text-align: center; font-size: 11px; color: var(--muted); font-weight: 600; padding: 4px 0; }
  .cal-day-label.sun { color: #ef4444; }
  .cal-day-label.sat { color: var(--blue); }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .cal-cell { aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 4px 2px 2px; cursor: pointer; transition: all 0.15s; position: relative; border: 1px solid transparent; }
  .cal-cell:hover { background: var(--surface); border-color: var(--border); }
  .cal-cell.other-month { opacity: 0.25; pointer-events: none; }
  .cal-cell.today { background: var(--green); }
  .cal-cell.today:hover { background: #05b34a; }
  .cal-cell.selected { background: var(--surface); border-color: var(--green); }
  .cal-cell.sun .cal-num { color: #ef4444; }
  .cal-cell.sat .cal-num { color: var(--blue); }
  .cal-cell.today .cal-num { color: #fff; font-weight: 800; }
  .cal-num { font-size: 13px; font-weight: 500; line-height: 1; }
  .cal-dots { display: flex; gap: 2px; margin-top: 3px; flex-wrap: wrap; justify-content: center; }
  .cal-dot { width: 4px; height: 4px; border-radius: 50%; }
  .cal-dot.personal { background: var(--green); }
  .cal-dot.team { background: var(--blue); }
  .cal-cell.today .cal-dot.personal { background: rgba(255,255,255,0.8); }
  .cal-cell.today .cal-dot.team { background: rgba(255,255,255,0.6); }

  /* Detail Panel */
  .detail-panel { margin: 0 16px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .detail-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .detail-date { font-size: 15px; font-weight: 700; }
  .detail-count { font-size: 12px; color: var(--muted); }
  .detail-list { padding: 8px; }
  .apt-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 10px; border-radius: 10px; margin-bottom: 4px; transition: background 0.15s; cursor: pointer; }
  .apt-item:last-child { margin-bottom: 0; }
  .apt-item.personal { background: rgba(6,199,85,0.06); }
  .apt-item.team { background: var(--blue-dim); }
  .apt-item:hover { filter: brightness(1.2); }
  .apt-time { font-size: 12px; font-weight: 700; min-width: 38px; padding-top: 2px; }
  .apt-item.personal .apt-time { color: var(--green); }
  .apt-item.team .apt-time { color: var(--blue); }
  .apt-info { flex: 1; }
  .apt-title { font-size: 14px; font-weight: 600; }
  .apt-item.team .apt-title { color: #93c5fd; }
  .apt-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .apt-notes { font-size: 11px; color: #64748b; margin-top: 3px; }
  .empty-day { padding: 24px; text-align: center; color: var(--muted); font-size: 14px; }

  /* Stats bar */
  .stats-bar { display: flex; gap: 12px; padding: 12px 16px; border-top: 1px solid var(--border); }
  .stat { flex: 1; text-align: center; }
  .stat-num { font-size: 20px; font-weight: 800; }
  .stat-num.green { color: var(--green); }
  .stat-num.blue { color: var(--blue); }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* Bottom bar */
  .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  .bottom-hint { font-size: 11px; color: var(--muted); text-align: center; }
  .bottom-hint span { color: var(--green); font-weight: 600; }
  .bottom-spacer { height: 60px; }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">กำลังโหลดปฏิทิน...</div>
</div>

<div class="error-page" id="error" style="display:none">
  <div class="error-icon">🔒</div>
  <div class="error-title">Link ไม่ถูกต้อง</div>
  <div class="error-sub">กรุณาขอ Link ใหม่จาก ปฏิทินBoy ใน LINE ครับ<br>พิมพ์ "ปฏิทิน" ใน chat</div>
</div>

<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">📅</div>
        <div class="logo-name">ปฏิทินBoy</div>
      </div>
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">ก</div>
        <div>
          <div class="user-name" id="user-name">กำลังโหลด...</div>
          <div class="user-plan" id="user-plan">Personal</div>
        </div>
      </div>
    </div>
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div>
        <div class="month-label" id="month-label">เมษายน 2026</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="today-btn" onclick="goToday()">วันนี้</button>
        <button class="nav-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
  </div>

  <!-- Search Bar -->
  <div style="padding:0 16px 12px">
    <div style="position:relative">
      <input id="search-input" type="text" placeholder="🔍 ค้นหานัดหมาย..." 
        style="width:100%;background:#161b22;border:1px solid #21262d;border-radius:10px;padding:10px 40px 10px 14px;color:#e6edf3;font-size:14px;font-family:'Sarabun',sans-serif;outline:none"
        oninput="handleSearch(this.value)" onfocus="this.style.borderColor='#06C755'" onblur="this.style.borderColor='#21262d'">
      <span id="search-clear" onclick="clearSearch()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#7d8590;cursor:pointer;display:none;font-size:16px">✕</span>
    </div>
  </div>
  <div id="search-results" style="display:none;margin:0 16px 16px;background:#161b22;border:1px solid #21262d;border-radius:16px;overflow:hidden"></div>

  <div class="cal-wrap">
    <div class="cal-days-header">
      <div class="cal-day-label sun">อา</div>
      <div class="cal-day-label">จ</div>
      <div class="cal-day-label">อ</div>
      <div class="cal-day-label">พ</div>
      <div class="cal-day-label">พฤ</div>
      <div class="cal-day-label">ศ</div>
      <div class="cal-day-label sat">ส</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <div class="detail-date" id="detail-date">เลือกวันเพื่อดูนัดหมาย</div>
      <div class="detail-count" id="detail-count"></div>
    </div>
    <div class="detail-list" id="detail-list">
      <div class="empty-day">กดวันที่ต้องการดูนัดหมายครับ 👆</div>
    </div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-num green" id="stat-personal">0</div><div class="stat-label">นัดส่วนตัว</div></div>
      <div class="stat"><div class="stat-num blue" id="stat-team">0</div><div class="stat-label">นัดทีม</div></div>
      <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">รวมเดือนนี้</div></div>
    </div>
  </div>

  <div class="bottom-spacer"></div>
  <div class="bottom-bar">
    <div class="bottom-hint">เพิ่มนัดหมายผ่าน <span>ปฏิทินBoy ใน LINE</span> ครับ</div>
  </div>
</div>

<script>
const thMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const thDays = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const thMonthsShort = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

let allApts = [];
let currentYear, currentMonth;
let todayStr, selectedDate;
const token = new URLSearchParams(location.search).get('token');
const BOT_URL = 'https://nong-krapuk-bot-production.up.railway.app';

function handleSearch(val) {
  const clear = document.getElementById('search-clear');
  const results = document.getElementById('search-results');
  clear.style.display = val ? 'block' : 'none';
  if (!val.trim()) { results.style.display = 'none'; return; }
  const keyword = val.trim().toLowerCase();
  const found = allApts.filter(a => a.title && a.title.toLowerCase().includes(keyword));
  results.style.display = 'block';
  if (found.length === 0) {
    results.innerHTML = '<div style="padding:16px;text-align:center;color:#7d8590;font-size:13px">ไม่พบนัดหมายที่ค้นหาครับ</div>';
    return;
  }
  const highlight = (text) => text.replace(new RegExp(keyword, 'gi'), m => `<mark style="background:#fef08a;color:#78350f;border-radius:2px">${m}</mark>`);
  results.innerHTML = '<div style="padding:10px 14px;font-size:11px;color:#7d8590;border-bottom:1px solid #21262d">พบ ' + found.length + ' รายการ</div>' +
    found.slice(0,10).map(apt => `
      <div style="padding:10px 14px;border-bottom:1px solid rgba(33,38,45,0.5);cursor:pointer" onclick="goToDate('${apt.meeting_date}')">
        <div style="font-size:13px;font-weight:600;color:#e6edf3">${highlight(apt.title)}</div>
        <div style="font-size:11px;color:#7d8590;margin-top:3px">📅 ${apt.meeting_date} ⏰ ${apt.start_time ? apt.start_time.slice(0,5) : '--:--'}${apt.location ? ' 📍 '+apt.location : ''}</div>
      </div>`).join('');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-results').style.display = 'none';
}

function goToDate(dateStr) {
  clearSearch();
  const d = new Date(dateStr + 'T00:00:00');
  currentYear = d.getFullYear();
  currentMonth = d.getMonth();
  selectedDate = dateStr;
  renderCalendar();
  renderDetail(dateStr);
  document.querySelector('.cal-wrap').scrollIntoView({ behavior: 'smooth' });
}

async function init() {
  if (!token) { showError(); return; }
  try {
    const ym = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
    const res = await fetch(`${BOT_URL}/api/calendar?token=${token}&month=${ym}`);
    if (!res.ok) { showError(); return; }
    const data = await res.json();
    allApts = data.appointments || [];
    const user = data.user || {};
    const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Bangkok' }));
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    todayStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    selectedDate = todayStr;
    const name = user.display_name || 'ผู้ใช้';
    const plan = user.plan || 'personal';
    document.getElementById('user-name').textContent = name;
    document.getElementById('user-avatar').textContent = name[0] || 'ก';
    document.getElementById('user-plan').textContent = plan === 'business' ? '● BUSINESS' : plan === 'personal' ? '● PERSONAL' : '● FREE';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').classList.add('ready');
    renderCalendar();
    renderDetail(todayStr);
  } catch(e) { showError(); }
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'flex';
}

async function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  try {
    const ym = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
    const res = await fetch(`${BOT_URL}/api/calendar?token=${token}&month=${ym}`);
    if (res.ok) { const data = await res.json(); allApts = data.appointments || []; }
  } catch(e) {}
  renderCalendar();
}

function goToday() {
  const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Bangkok' }));
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  selectedDate = todayStr;
  renderCalendar();
  renderDetail(todayStr);
}

function renderCalendar() {
  document.getElementById('month-label').textContent = `${thMonths[currentMonth]} ${currentYear + 543}`;
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const prevDays = new Date(currentYear, currentMonth, 0).getDate();
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Stats
  const monthStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const monthApts = allApts.filter(a => a.meeting_date && a.meeting_date.startsWith(monthStr));
  const personalCount = monthApts.filter(a => !a.team_id).length;
  const teamCount = monthApts.filter(a => a.team_id).length;
  document.getElementById('stat-personal').textContent = personalCount;
  document.getElementById('stat-team').textContent = teamCount;
  document.getElementById('stat-total').textContent = monthApts.length;

  // Prev month
  for (let i = firstDay - 1; i >= 0; i--) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell other-month';
    cell.innerHTML = `<div class="cal-num">${prevDays - i}</div>`;
    grid.appendChild(cell);
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const dayApts = allApts.filter(a => a.meeting_date === dateStr);
    const hasPersonal = dayApts.some(a => !a.team_id);
    const hasTeam = dayApts.some(a => a.team_id);
    let cls = 'cal-cell';
    if (dateStr === todayStr) cls += ' today';
    if (dateStr === selectedDate && dateStr !== todayStr) cls += ' selected';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    const dots = [hasPersonal ? '<div class="cal-dot personal"></div>' : '', hasTeam ? '<div class="cal-dot team"></div>' : ''].join('');
    const cell = document.createElement('div');
    cell.className = cls;
    cell.innerHTML = `<div class="cal-num">${d}</div>${dots ? '<div class="cal-dots">' + dots + '</div>' : ''}`;
    cell.addEventListener('click', () => { selectedDate = dateStr; renderCalendar(); renderDetail(dateStr); });
    grid.appendChild(cell);
  }

  // Next month
  const total = firstDay + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= remaining; d++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell other-month';
    cell.innerHTML = `<div class="cal-num">${d}</div>`;
    grid.appendChild(cell);
  }
}

function renderDetail(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dayName = thDays[d.getDay()];
  const dayNum = d.getDate();
  const monthName = thMonthsShort[d.getMonth()];
  const dayApts = allApts.filter(a => a.meeting_date === dateStr).sort((a,b) => a.start_time.localeCompare(b.start_time));
  document.getElementById('detail-date').textContent = `${dayName}ที่ ${dayNum} ${monthName}`;
  document.getElementById('detail-count').textContent = dayApts.length > 0 ? `${dayApts.length} นัดหมาย` : '';
  const list = document.getElementById('detail-list');
  if (dayApts.length === 0) { list.innerHTML = '<div class="empty-day">ว่างทั้งวัน 😊</div>'; return; }
  list.innerHTML = dayApts.map(apt => {
    const isTeam = !!apt.team_id;
    const time = apt.start_time ? apt.start_time.slice(0,5) : '--:--';
    const loc = apt.location ? `📍 ${apt.location}` : '';
    const notes = apt.notes ? `📝 ${apt.notes.slice(0,60)}${apt.notes.length > 60 ? '...' : ''}` : '';
    return `<div class="apt-item ${isTeam ? 'team' : 'personal'}">
      <div class="apt-time">${time}</div>
      <div class="apt-info">
        <div class="apt-title">${isTeam ? '👥 ' : ''}${apt.title}</div>
        ${loc ? `<div class="apt-meta">${loc}</div>` : ''}
        ${notes ? `<div class="apt-notes">${notes}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

init();
</script>
</body>
</html>
